<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action=""></form>
     <label for=""><b>Foto Mahasiswa      </b></label> 
     <input type="button" value="Choose File" > <label for="">No file choosen</label>
     <br /><br />

     <label for=""><B>NIK / Warga Negara *</B></label> 
     <input type="text" name="" id="" placeholder="NIK /No KTP" />
     <input type="text" name="" id="" placeholder="Warga Negara" />
     <br /><br />

     <label for=""><B>Nama Lengkap *</B></label> 
     <input type="text" name="" id="" placeholder="Nama Lengkap" />
     <br /><br />

     <label for=""><B>Tempat, Tgl Lahir *</B></label> 
     <input type="text" name="" id="" placeholder="Tempat Lahir" />
     <input type="text" name="" id="" placeholder="Tanggal Lahir" />
     <br /><br />

     <label for=""><B>Agama / Kelamin *</B></label> 
     <select name="" id="">
        <option value="">Protestan</option>
        <option value="">Katholik</option>
        <option value="">Buddha</option>
        <option value="">Konghucu</option>
        
        <input type="radio" name="" id=""/>
        <label for="">Laki-laki</label>

        <input type="radio" name="" id=""/>
        <label for="">Perempuan</label>
        <br /><br />

        <label for=""><B>Email / No WA *</B></label> 
     <input type="text" name="" id="" placeholder="Email" />
     <input type="text" name="" id="" placeholder="No WhatsApp" />
     <br /><br />

     <label for=""><B>No Telepon / HP *</B></label> 
     <input type="text" name="" id="" placeholder="No Telepon" />
     <input type="text" name="" id="" placeholder="No Handphone" />
     <br /><br />

     <label for=""><B>Alamat KTP *</B></label> 
     <input type="text" name="" id="" placeholder="Alamat Asal (Sesuai KTP)" />
     <br /><br /><br />

     <label for=""><B>Kel / Kec KTP *</B></label> 
     <input type="text" name="" id="" placeholder="Kelurahan KTP" />
     <input type="text" name="" id="" placeholder="Kecamatan KTP" />
     <br /><br />

     <label for=""><B>Kab.Kota / Prov KTP *</B></label> 
     <input type="text" name="" id="" placeholder="Kabupaten / Kota KTP" />
     <input type="text" name="" id="" placeholder="Provinsi KTP" />
     <br /><br />

     <label for=""><B>RT/RW / Kode Pos KTP *</B></label> 
     <input type="text" name="" id="" placeholder="RT/RW KTP" />
     <input type="text" name="" id="" placeholder="Kode Pos KTP" />
     <br /><br />

     <label for=""><B>Alamat Sekitar PTK </B></label> 
     <input type="text" name="" id="" placeholder="Alamat Sekitar Pontianak" />
     <br /><br /><br /><br />

     <label for=""><B>Kel / Kec PTK</B></label> 
     <input type="text" name="" id="" placeholder="Kelurahan Sekitar Pontianak" />
     <input type="text" name="" id="" placeholder="Kecamatan Sekitar Pontianak" />
     <br /><br />

     <label for=""><B>Kab/Kota Sekitar Pontianak</B></label> 
     <input type="text" name="" id="" placeholder="Kabupaten / Kota Sekitar Pontianak" />
     <br /><br />

     <label for=""><B>RT/RW / Kode Pos PTK</B></label> 
     <input type="text" name="" id="" placeholder="RT/RW Sekitar Pontianak" />
     <input type="text" name="" id="" placeholder="Kode Pos Sekitar Pontianak" />
     <br /><br />
     </select>
    </form>
